<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loyslow Dev</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- Экран входа (Overlay) -->
    <div id="overlay">
        <div class="overlay-content">
            <div class="loader-ring"></div>
            <h1>SYSTEM LOCKED</h1>
            <p>Click to Initialize</p>
        </div>
    </div>

    <!-- Фон -->
    <canvas id="space-canvas"></canvas>

    <div class="container">
        <div class="bento-grid">
            
            <!-- BIO -->
            <div class="card bio-card" id="bio-card">
                <div class="loader"><i class="fa-solid fa-circle-notch fa-spin"></i> Loading Bio...</div>
            </div>

            <!-- Stack -->
            <div class="card tech-card">
                <h3>Stack</h3>
                <div class="marquee-container">
                    <div class="marquee" id="tech-track"></div>
                </div>
            </div>

            <!-- Repos -->
            <div class="card repos-card">
                <h3>GitHub Repositories</h3>
                <div class="repos-list" id="repos-list">
                    <div class="loader"><i class="fa-solid fa-circle-notch fa-spin"></i> Loading...</div>
                </div>
            </div>

            <!-- Projects -->
            <div class="card projects-card">
                <h3>Projects</h3>
                <div class="projects-grid" id="projects-grid"></div>
            </div>

        </div>
    </div>

    <!-- Обновленный Плеер -->
    <div class="player-wrapper">
        <!-- Кнопка развертывания (появляется при наведении) -->
        <button id="expand-btn" class="expand-btn hidden">
            <i class="fa-solid fa-chevron-up"></i>
        </button>

        <div class="music-player collapsed" id="music-player">
            <!-- Мини-контроль (виден когда свернут) -->
            <div class="mini-controls">
                <button id="mini-play-btn"><i class="fa-solid fa-play"></i></button>
            </div>

            <!-- Полный интерфейс -->
            <div class="full-player">
                <div class="visualizer-container">
                    <canvas id="visualizer"></canvas>
                </div>
                <div class="track-info">
                    <h4 id="track-name">No Music</h4>
                    <p id="track-artist">Select Track</p>
                </div>
                <div class="timeline-container">
                    <span id="current-time">0:00</span>
                    <input type="range" id="seek-slider" max="100" value="0">
                    <span id="duration">0:00</span>
                </div>
                <div class="main-controls">
                    <button id="prev-btn"><i class="fa-solid fa-backward"></i></button>
                    <button id="play-btn" class="big-play"><i class="fa-solid fa-play"></i></button>
                    <button id="next-btn"><i class="fa-solid fa-forward"></i></button>
                </div>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
